name: Atualizar Galeria do Google Drive

on:
  schedule:
    # Executa a cada 6 horas (às 00:00, 06:00, 12:00 e 18:00 UTC)
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
  workflow_dispatch: # Permite execução manual pelo painel do GitHub Actions

permissions:
  contents: write # Dá permissão para fazer commit e push de volta no repositório

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
    - name: Código Checkout
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Executar Script de Atualização
      run: python atualizar_galeria.py

    - name: Commit e Push das alterações
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add galeria.json
        if git diff --cached --quiet; then
          echo "Nenhuma alteração no galeria.json detectada."
        else
          git commit -m "chore: atualiza galeria.json com mídias do Google Drive [skip ci]"
          git push
        fi
